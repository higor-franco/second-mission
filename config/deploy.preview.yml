servers:
  web:
    hosts:
      - <%= ENV['INFRA_WEB_IP'] %>

env:
  clear:
    APP_ENV: preview
    BASE_URL: https://second-mission.com
  secret:
    - DATABASE_URL
    - SESSION_SECRET
    - SMTP_USER
    - SMTP_PASSWORD
    - SMTP_FROM
    - ANTHROPIC_API_KEY

proxy:
  hosts:
    - second-mission.com
    - www.second-mission.com
  ssl: true

accessories:
  db:
    image: supabase/postgres:17.6.1.103
    host: <%= ENV['INFRA_DB_IP'] %>
    port: "5432:5432"
    cmd: "postgres -D /etc/postgresql -c shared_buffers=512MB -c effective_cache_size=1536MB -c work_mem=5MB -c maintenance_work_mem=128MB -c max_connections=100"
    env:
      secret:
        - POSTGRES_PASSWORD
    directories:
      - /data/pgdata:/var/lib/postgresql/data
