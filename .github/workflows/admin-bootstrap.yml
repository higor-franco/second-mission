name: Admin Bootstrap (one-off)

# Intentionally workflow_dispatch only — this workflow mutates production
# state (wipes all veterans and resets the admin login) and must never fire
# on push. It's committed, triggered once via `gh workflow run`, then
# deleted along with ADMIN_BOOTSTRAP_HASH in a follow-up commit.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "RESET" to confirm veteran wipe + admin reset'
        required: true
        default: 'no'

jobs:
  reset:
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'RESET' }}
    env:
      # The bcrypt hash is provisioned ahead of time into a GitHub Secret.
      # Passing it through env rather than inline keeps it out of the step
      # command line (where it would end up in the expanded shell string).
      ADMIN_HASH: ${{ secrets.ADMIN_BOOTSTRAP_HASH }}
      # Hardcoded IP — stable across redeploys of the same environment;
      # this workflow is a one-off and will be deleted after it runs.
      DB_IP: 191.252.228.77
      # Name matches the `<repo>-<accessory>` convention Kamal uses.
      DB_CONTAINER: second-mission-db
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Reset veterans and set admin credentials
        run: |
          set -euo pipefail

          # Build the SQL in a heredoc so we can interpolate $ADMIN_HASH
          # once. The surrounding BEGIN/COMMIT ensures partial failures
          # don't leave the DB half-wiped.
          SQL=$(cat <<SQL_EOF
          BEGIN;
          DELETE FROM veteran_applications;
          DELETE FROM sessions        WHERE user_type = 'veteran';
          DELETE FROM activity_logs   WHERE user_type = 'veteran';
          DELETE FROM magic_tokens    WHERE user_type = 'veteran';
          DELETE FROM veterans;
          DELETE FROM admins;
          INSERT INTO admins (email, password_hash, name)
            VALUES ('higorfranco@gmail.com', '${ADMIN_HASH}', 'Higor Franco');
          COMMIT;
          -- Sanity-check output the workflow can log.
          SELECT 'veterans_remaining' AS metric, COUNT(*)::text AS value FROM veterans
          UNION ALL
          SELECT 'admins_total',                    COUNT(*)::text           FROM admins
          UNION ALL
          SELECT 'admin_email',                     COALESCE(MAX(email),'')  FROM admins;
          SQL_EOF
          )

          # SSH into the db accessory VM and pipe the SQL into psql running
          # inside the Postgres container. `-T` disables pseudo-tty so
          # stdin is piped cleanly; StrictHostKeyChecking=no accepts the
          # first-run host fingerprint (private preview VM, single-use).
          ssh -T -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "root@${DB_IP}" \
              "docker exec -i ${DB_CONTAINER} psql -U postgres -d postgres -v ON_ERROR_STOP=1" \
              <<< "$SQL"
